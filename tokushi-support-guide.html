<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>特別支援教育 行動支援ガイド</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #1565C0; --primary-light: #E3F2FD; --accent: #FF6F00;
      --bg: #F5F7FA; --card: #FFFFFF; --text: #1A1A2E;
      --subtext: #546E7A; --border: #E0E7EF; --shadow: 0 2px 12px rgba(21,101,192,0.10);
      --cat1: #2E7D32; --cat2: #6A1B9A; --cat3: #1565C0; --cat4: #E65100; --cat5: #C62828; --cat6: #00695C;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; padding-bottom: 90px; }

    header { background: var(--primary); color: white; padding: 14px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .header-row { display: flex; align-items: center; justify-content: space-between; max-width: 860px; margin: 0 auto; }
    header h1 { font-size: 17px; font-weight: 700; line-height: 1.2; }
    header .subtitle { font-size: 11px; opacity: 0.8; }
    #csvBtn { background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.5); color: white; padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600; white-space: nowrap; }
    #csvBtn:hover { background: rgba(255,255,255,0.28); }

    .breadcrumb { background: white; border-bottom: 1px solid var(--border); padding: 8px 16px; }
    .bc-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--subtext); flex-wrap: wrap; }
    .crumb { cursor: pointer; color: var(--primary); } .crumb:hover { text-decoration: underline; }
    .sep { color: #bbb; } .bc-current { color: var(--text); font-weight: 600; }

    main { max-width: 860px; margin: 0 auto; padding: 16px; }
    .step-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .step-badge { background: var(--primary); color: white; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
    .step-title { font-size: 16px; font-weight: 700; }
    .step-desc { font-size: 12px; color: var(--subtext); margin-bottom: 14px; line-height: 1.5; }

    /* ── SELECTABLE CARDS ── */
    .sel-grid { display: grid; gap: 12px; }
    .sel-grid.cat-cols { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    .sel-grid.prob-cols { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }

    .sel-card {
      background: var(--card); border: 2px solid var(--border); border-radius: 14px;
      padding: 14px 12px; cursor: pointer; text-align: left;
      transition: all 0.15s; box-shadow: var(--shadow); position: relative;
      user-select: none;
    }
    .sel-card:hover { transform: translateY(-1px); }
    .sel-card.selected { border-color: var(--primary); background: var(--primary-light); }
    .sel-card .chk {
      position: absolute; top: 10px; right: 10px;
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border); background: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: transparent;
      transition: all 0.15s; flex-shrink: 0;
    }
    .sel-card.selected .chk { background: var(--primary); border-color: var(--primary); color: white; }

    .card-icon { font-size: 26px; margin-bottom: 6px; }
    .card-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; margin-right: 26px; }
    .card-desc { font-size: 11px; color: var(--subtext); line-height: 1.4; }
    .card-count { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; display: inline-block; margin-top: 6px; }
    .card-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; background: #FFF3E0; color: #E65100; display: inline-block; margin-top: 6px; }

    /* ── HYPOTHESIS SECTION ── */
    .prob-section { background: var(--card); border-radius: 14px; box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; }
    .prob-section-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .prob-section-header .ph-icon { font-size: 20px; }
    .prob-section-header .ph-name { font-weight: 700; font-size: 14px; }
    .prob-section-body { padding: 12px 16px; }

    .jiritsu-row { margin-bottom: 10px; }
    .cat-label { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 8px; color: white; margin-bottom: 5px; }
    .cat-1{background:var(--cat1)} .cat-2{background:var(--cat2)} .cat-3{background:var(--cat3)}
    .cat-4{background:var(--cat4)} .cat-5{background:var(--cat5)} .cat-6{background:var(--cat6)}
    .j-items { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }
    .j-item { font-size: 11px; padding: 3px 8px; border-radius: 8px; font-weight: 500; }
    .item-cat-1{background:#E8F5E9;color:var(--cat1)} .item-cat-2{background:#F3E5F5;color:var(--cat2)}
    .item-cat-3{background:#E3F2FD;color:var(--cat3)} .item-cat-4{background:#FFF3E0;color:var(--cat4)}
    .item-cat-5{background:#FFEBEE;color:var(--cat5)} .item-cat-6{background:#E0F2F1;color:var(--cat6)}

    .hyp-list { display: flex; flex-direction: column; gap: 8px; }
    .hyp-card {
      border: 2px solid var(--border); border-radius: 10px; padding: 11px 14px;
      cursor: pointer; display: flex; align-items: flex-start; gap: 10px;
      transition: all 0.15s; background: white;
    }
    .hyp-card:hover { border-color: var(--accent); background: #FFF8E1; }
    .hyp-card.selected { border-color: var(--accent); background: #FFF3E0; }
    .hyp-card.selected .h-chk { background: var(--accent); border-color: var(--accent); color: white; }
    .h-chk {
      width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border);
      background: white; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: transparent; flex-shrink: 0; margin-top: 2px;
    }
    .hyp-text { font-size: 13px; font-weight: 600; line-height: 1.4; }

    /* ── RESULT ── */
    .result-block { background: var(--card); border-radius: 14px; box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; }
    .result-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; }
    .result-body { padding: 12px 16px; }
    .hyp-pill { background: linear-gradient(135deg,#FF6F00,#FF8F00); color: white; border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .hyp-pill .pill-label { font-size: 10px; opacity: 0.85; margin-bottom: 3px; }
    .sup-item { background: #F8F9FF; border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; padding: 10px 12px; margin-bottom: 8px; }
    .sup-num { font-size: 10px; color: var(--primary); font-weight: 700; margin-bottom: 3px; }
    .sup-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .sup-detail { font-size: 11px; color: var(--subtext); line-height: 1.5; }
    .merged-jiritsu { margin-top: 8px; }

    /* ── STICKY BOTTOM BAR ── */
    .next-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 2px solid var(--border);
      padding: 12px 20px; display: flex; justify-content: center; gap: 12px;
      z-index: 90; box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
    }
    .next-btn {
      background: var(--primary); color: white; border: none;
      padding: 13px 30px; border-radius: 25px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; min-width: 220px;
    }
    .next-btn:disabled { background: #ccc; cursor: not-allowed; }
    .next-btn:not(:disabled):hover { background: #0D47A1; }
    .back-btn2 { background: white; border: 2px solid var(--border); color: var(--subtext); padding: 13px 20px; border-radius: 25px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .back-btn2:hover { border-color: var(--primary); color: var(--primary); }

    .again-btn { background: var(--primary); color: white; border: none; padding: 13px 24px; border-radius: 25px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; }
    .again-btn:hover { background: #0D47A1; }
    .log-badge { background: #E8F5E9; color: var(--cat1); border-radius: 12px; padding: 6px 14px; font-size: 12px; font-weight: 600; display: inline-block; margin-top: 16px; }

    .section-divider { font-size: 12px; font-weight: 700; color: var(--subtext); padding: 8px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.22s ease; }
    #toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(40px); background:#222; color:white; padding:9px 18px; border-radius:18px; font-size:13px; font-weight:600; transition:transform 0.3s; z-index:999; pointer-events:none; white-space:nowrap; }
    #toast.show { transform:translateX(-50%) translateY(0); }
    @media(max-width:480px){ .sel-grid.cat-cols{grid-template-columns:1fr} .sel-grid.prob-cols{grid-template-columns:1fr 1fr} }
  </style>
</head>
<body>
<header>
  <div class="header-row">
    <div><h1>特別支援教育 行動支援ガイド</h1><div class="subtitle">自立活動6区分27項目 連携サポートツール</div></div>
    <button id="csvBtn" onclick="exportCSV()">📥 CSV出力</button>
  </div>
</header>
<div class="breadcrumb" id="bc" style="display:none"><div class="bc-inner" id="bcInner"></div></div>
<main id="main"></main>
<div id="nextBar" class="next-bar" style="display:none"></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// 自立活動の区分
// ═══════════════════════════════════════════
const JC = [
  {id:1,name:"健康の保持",       cc:"cat-1",ic:"item-cat-1"},
  {id:2,name:"心理的な安定",     cc:"cat-2",ic:"item-cat-2"},
  {id:3,name:"人間関係の形成",   cc:"cat-3",ic:"item-cat-3"},
  {id:4,name:"環境の把握",       cc:"cat-4",ic:"item-cat-4"},
  {id:5,name:"身体の動き",       cc:"cat-5",ic:"item-cat-5"},
  {id:6,name:"コミュニケーション",cc:"cat-6",ic:"item-cat-6"},
];
function jc(id){return JC.find(c=>c.id===id);}

// ═══════════════════════════════════════════
// 問題行動データ
// ═══════════════════════════════════════════
const P = {
  p01:{icon:"🤕",name:"自傷行為",desc:"頭を叩く・手を噛む・壁に頭をぶつけるなど",tag:null,
    jiritsu:[{catId:2,items:["情緒の安定","障害による学習上又は生活上の困難を改善・克服する意欲"]},{catId:3,items:["自己の理解と行動の調整"]},{catId:4,items:["感覚や認知の特性についての理解と対応"]}],
    hypotheses:[
      {id:"h1",text:"感覚刺激を求めている（感覚探求行動）",supports:[{title:"代替感覚刺激の提供",detail:"噛むチューブ・重いベスト・バイブレーターなど安全な感覚刺激グッズを常時用意する。"},{title:"感覚ダイエットの実施",detail:"作業療法士と連携し、1日の中で定期的に感覚刺激を取り入れるスケジュールを組む。"},{title:"前庭・固有感覚への対応",detail:"ブランコ・トランポリン・重い荷物運びなど全身運動の機会を意図的に設ける。"}]},
      {id:"h2",text:"不快な感覚・痛みから逃れようとしている",supports:[{title:"不快刺激の同定と除去",detail:"行動が起きる場所・時間・活動を記録し、騒音・光・触感などを特定して除去する。"},{title:"感覚補助具の活用",detail:"イヤーマフ・サングラス・特定素材の衣服など本人にあった補助具を導入する。"},{title:"医療機関との連携",detail:"痛みや不快感の身体的原因（耳の炎症・歯痛など）を除外するため医師に相談する。"}]},
      {id:"h3",text:"要求・気持ちを伝えるコミュニケーション手段になっている",supports:[{title:"代替コミュニケーション手段の指導",detail:"PECS・AAC機器・絵カードを使い「もっと」「いや」「助けて」など基本的な意思伝達を教える。"},{title:"機能的コミュニケーションの強化",detail:"自傷の前に代替行動（手を挙げる、カードを渡す）が出たらすぐに応じる。"},{title:"感情表出の練習",detail:"感情カードや感情温度計を用いて気持ちの状態を視覚的に示す練習を日常的に行う。"}]},
      {id:"h4",text:"注目・反応を得たい（注目獲得）",supports:[{title:"適切な行動への先行注目",detail:"落ち着いている場面で積極的に声かけ・関わりを増やし、注目ニーズを計画的に満たす。"},{title:"計画的な無視と代替行動の強化",detail:"自傷への反応を最小化し、静かに過ごせたときに笑顔で称賛する。"},{title:"1対1の関わりタイムの設定",detail:"一日の中で1対1の関わりタイムを設定し注目ニーズを計画的に満たす。"}]},
    ]},
  p02:{icon:"👊",name:"他害行為",desc:"友達や先生を叩く・噛む・引っ掻くなど",tag:null,
    jiritsu:[{catId:2,items:["情緒の安定","状況の理解と変化への対応"]},{catId:3,items:["他者の意図や感情の理解","自己の理解と行動の調整"]},{catId:6,items:["コミュニケーションの基礎的能力","状況に応じたコミュニケーション"]}],
    hypotheses:[
      {id:"h1",text:"要求が通らないフラストレーションの爆発",supports:[{title:"要求を事前に叶える工夫",detail:"何が欲しいか・したいかを先読みし、フラストレーションが高まる前に選択肢を提示する。"},{title:"怒りのコントロールスキルの指導",detail:"深呼吸・静かな場所へ移動など、自分を落ち着かせる方法をゲーム形式で練習する。"},{title:"代替表現の確立",detail:"「ください」「かして」「いや」を絵カードや音声で伝えられるよう集中的に練習する。"}]},
      {id:"h2",text:"混乱・パニック状態から身を守ろうとしている",supports:[{title:"クールダウンスペースの設置",detail:"刺激を減らした落ち着けるコーナー（衝立・クッション・好きなアイテム）を教室内に設ける。"},{title:"危機の予兆サインの把握",detail:"他害前のサイン（耳を塞ぐ・うなる・体が固くなる）をリスト化し早期に介入する。"},{title:"環境の構造化と刺激量の調整",detail:"刺激が多い場面でのサポート体制を組み、必要に応じて退席できる仕組みを作る。"}]},
      {id:"h3",text:"「やめて」「いや」を伝える唯一の手段になっている",supports:[{title:"拒否カードの導入",detail:"「いや」「やめて」を表す絵カードを常に手の届く場所に置き、使えたらすぐに応じる。"},{title:"拒否が認められる経験の積み重ね",detail:"小さな場面で「いや」が通る経験を増やし、コミュニケーションへの信頼を築く。"},{title:"ソーシャルストーリーの活用",detail:"「こまったときはカードを使う」という場面を絵本形式でまとめ繰り返し読み聞かせる。"}]},
      {id:"h4",text:"感覚的な問題（触覚防衛など）による反射的反応",supports:[{title:"触られることへの段階的脱感作",detail:"本人が安心できる距離感・触れ方を確認し、合意の上でゆっくり身体接触への慣れを促す。"},{title:"触覚防衛への環境配慮",detail:"人が密集する場面で本人の立ち位置を端にするなど、不意の接触を減らす。"},{title:"固有感覚への働きかけ",detail:"重いものを運ぶ・壁押しなど固有感覚入力で神経系を落ち着かせ触覚防衛を緩和する。"}]},
    ]},
  p03:{icon:"😤",name:"癇癪・パニック",desc:"急に大泣き・叫ぶ・床に倒れて動かなくなるなど",tag:null,
    jiritsu:[{catId:2,items:["情緒の安定","状況の理解と変化への対応"]},{catId:4,items:["感覚や認知の特性についての理解と対応","認知や行動の手がかりとなる概念の形成"]},{catId:3,items:["自己の理解と行動の調整"]}],
    hypotheses:[
      {id:"h1",text:"見通しが持てない不安・急な変更への対応困難",supports:[{title:"視覚的スケジュールの活用",detail:"1日の流れをカード・写真・絵で示したスケジュール表を準備し、変更時は変更カードで事前に伝える。"},{title:"予告と移行の準備",detail:"「あと5分でおわり」と時計やタイマーを使って視覚的に予告する習慣をつける。"},{title:"変化への段階的慣れ",detail:"小さな変更（席の変更など）から始め、変化後にも安全だという経験を積み重ねる。"}]},
      {id:"h2",text:"感覚過負荷（感覚情報が処理しきれない）",supports:[{title:"刺激量の調整",detail:"騒がしい環境・蛍光灯の点滅・人の密集など過負荷になる感覚刺激を特定し減らす。"},{title:"逃げ場・クールダウンスペースの設置",detail:"感覚負荷が高まったとき自分から移動できる「静かな場所」を確保し使い方を練習する。"},{title:"感覚調整グッズの導入",detail:"イヤーマフ・フィジェットツール・重いブランケットなど感覚を自己調整できるアイテムを揃える。"}]},
      {id:"h3",text:"要求・拒否が伝わらない積み重なりによる爆発",supports:[{title:"要求・拒否の代替手段確立",detail:"「ちょうだい」「やめて」「もっと」「もういい」を1枚ずつカードにし使う練習を毎日繰り返す。"},{title:"応答性の向上",detail:"コミュニケーションの芽（視線・手差し・発声）に素早く応じ伝わる実感を積み重ねる。"},{title:"フラストレーション早期発見",detail:"不満の初期サイン（そわそわ・顔が赤い・声が変わる）を記録し早い段階で介入する。"}]},
      {id:"h4",text:"疲労・体調不良・睡眠不足による耐性低下",supports:[{title:"健康チェックルーティンの導入",detail:"登校時に体調確認（顔色・目の様子・保護者からの情報）を行い配慮のある日課を設定する。"},{title:"保護者との情報共有",detail:"就寝時刻・食事・体調の連絡帳記入を依頼し学校での対応に活かす。"},{title:"活動量の調整",detail:"体調や疲労度に応じてその日の活動量・難易度を柔軟に調整する仕組みを作る。"}]},
    ]},
  p04:{icon:"🏃",name:"離席・逃走行動",desc:"教室を出て行く・校内を走り回る・外に出ようとするなど",tag:null,
    jiritsu:[{catId:2,items:["情緒の安定","状況の理解と変化への対応"]},{catId:4,items:["感覚や認知の特性についての理解と対応"]},{catId:5,items:["身体の移動能力"]}],

    <div class="sel-card ${selCatIds.has(c.id)?'selected':''}"
         onclick="toggleCat('${c.id}')"
         style="border-color:${selCatIds.has(c.id)?c.color:''};background:${selCatIds.has(c.id)?c.bg:''}">
      <div class="chk">✓</div>
      <div class="card-icon">${c.icon}</div>
      <div class="card-name" style="color:${c.color}">${c.name}</div>
      <div class="card-desc">${c.desc}</div>
      <span class="card-count" style="background:${c.bg};color:${c.color}">${c.pids.length}項目</span>
    </div>`).join('');

  document.getElementById('main').innerHTML=`
    <div class="step-label"><span class="step-badge">STEP 1</span><span class="step-title">カテゴリーを選んでください（複数可）</span></div>
    <p class="step-desc">気になる問題行動のカテゴリーをタップして選択してください。複数選ぶことができます。</p>
    <div class="sel-grid cat-cols fade-in">${cards}</div>
    ${sessionLog.length>0?`<div class="log-badge">✅ 本日の記録: ${sessionLog.length}件</div>`:''}
  `;
}

// ── STEP 1: 問題行動選択 ─────────────────────
function renderProbs(){
  // 選択カテゴリーでグループ化
  const activeCats = CATS.filter(c=>selCatIds.has(c.id));
  let html = '';
  activeCats.forEach(c=>{
    const cards = c.pids.map(pid=>{
      const p=P[pid];
      const sel=selProbIds.has(pid);
      return `
        <div class="sel-card ${sel?'selected':''}"
             onclick="toggleProb('${pid}')"
             style="border-color:${sel?c.color:''};background:${sel?c.bg:''}">
          <div class="chk">✓</div>
          <div class="card-icon">${p.icon}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          ${p.tag?`<span class="card-tag">${p.tag}</span>`:''}
        </div>`;
    }).join('');
    html+=`<div class="section-divider">${c.icon} ${c.name}</div><div class="sel-grid prob-cols" style="margin-bottom:16px">${cards}</div>`;
  });

  document.getElementById('main').innerHTML=`
    <div class="step-label"><span class="step-badge">STEP 2</span><span class="step-title">問題行動を選んでください（複数可）</span></div>
    <p class="step-desc">調べたい問題行動をタップして選択してください。複数選ぶことができます。</p>
    <div class="fade-in">${html}</div>
  `;
}

// ── STEP 2: 仮説選択 ────────────────────────
function renderHyps(){
  let html='';
  selProbIds.forEach(pid=>{
    const p=P[pid];
    const cat=pidToCat[pid];
    if(!selHypMap[pid]) selHypMap[pid]=new Set();

    const jiritsuHtml=p.jiritsu.map(area=>{
      const c=jc(area.catId);
      return `<div class="jiritsu-row">
        <div class="cat-label ${c.cc}">${c.name}</div>
        <div class="j-items">${area.items.map(i=>`<span class="j-item ${c.ic}">▸ ${i}</span>`).join('')}</div>
      </div>`;
    }).join('');

    const hypHtml=p.hypotheses.map((h,i)=>`
      <div class="hyp-card ${selHypMap[pid].has(h.id)?'selected':''}" onclick="toggleHyp('${pid}','${h.id}')">
        <div class="h-chk">✓</div>
        <div class="hyp-text">${i+1}. ${h.text}</div>
      </div>`).join('');

    html+=`
      <div class="prob-section">
        <div class="prob-section-header" style="background:${cat.bg}20">
          <span class="ph-icon">${p.icon}</span>
          <span class="ph-name" style="color:${cat.color}">${p.name}</span>
        </div>
        <div class="prob-section-body">
          <div style="margin-bottom:10px">${jiritsuHtml}</div>
          <div style="font-size:12px;color:var(--subtext);font-weight:600;margin-bottom:8px">原因の仮説（複数選択可）</div>
          <div class="hyp-list">${hypHtml}</div>
        </div>
      </div>`;
  });

  document.getElementById('main').innerHTML=`
    <div class="step-label"><span class="step-badge">STEP 3</span><span class="step-title">原因の仮説を選んでください（複数可）</span></div>
    <p class="step-desc">各問題行動について、当てはまると思われる仮説をタップしてください。複数選ぶことができます。</p>
    <div class="fade-in">${html}</div>
  `;
}

// ── STEP 3: 結果 ─────────────────────────────
function renderResult(){
  let html='';
  selProbIds.forEach(pid=>{
    const p=P[pid];
    const cat=pidToCat[pid];
    const hyps=[...selHypMap[pid]].map(hid=>p.hypotheses.find(h=>h.id===hid)).filter(Boolean);
    if(!hyps.length) return;

    const jiritsuHtml=p.jiritsu.map(area=>{
      const c=jc(area.catId);
      return `<div class="jiritsu-row">
        <div class="cat-label ${c.cc}">${c.name}</div>
        <div class="j-items">${area.items.map(i=>`<span class="j-item ${c.ic}">▸ ${i}</span>`).join('')}</div>
      </div>`;
    }).join('');

    const hypBlocks=hyps.map(h=>`
      <div class="hyp-pill">
        <div class="pill-label">仮説（原因）</div>${h.text}
      </div>
      <div style="margin-bottom:12px">${h.supports.map((s,i)=>`
        <div class="sup-item">
          <div class="sup-num">支援例 ${i+1}</div>
          <div class="sup-title">${s.title}</div>
          <div class="sup-detail">${s.detail}</div>
        </div>`).join('')}
      </div>`).join('');

    html+=`
      <div class="result-block">
        <div class="result-header" style="background:${cat.bg}20">
          <span style="font-size:18px">${p.icon}</span>
          <span style="color:${cat.color}">${p.name}</span>
        </div>
        <div class="result-body">
          <div class="merged-jiritsu" style="margin-bottom:12px">${jiritsuHtml}</div>
          ${hypBlocks}
        </div>
      </div>`;
  });

  document.getElementById('main').innerHTML=`
    <div class="step-label"><span class="step-badge">支援方法の例</span></div>
    <div class="fade-in">
      ${html}
      <button class="again-btn" onclick="restart()">🔍 最初からやり直す</button>
    </div>
  `;
}

// ═══════════════════════════════════════════
// NEXT BAR
// ═══════════════════════════════════════════
function totalHypSel(){
  return Object.values(selHypMap).reduce((s,set)=>s+set.size,0);
}

function renderNextBar(){
  const bar=document.getElementById('nextBar');
  if(step===3){bar.style.display='none';return;}
  bar.style.display='flex';

  let disabled=true, label='', backLabel='';
  if(step===0){ disabled=selCatIds.size===0; label=`次へ：問題行動を選ぶ（${selCatIds.size}カテゴリー選択中）`; }
  if(step===1){ disabled=selProbIds.size===0; label=`次へ：仮説を選ぶ（${selProbIds.size}件選択中）`; backLabel='← カテゴリーに戻る'; }
  if(step===2){ disabled=totalHypSel()===0; label=`結果を見る（${totalHypSel()}件の仮説選択中）`; backLabel='← 問題行動に戻る'; }

  bar.innerHTML=`
    ${backLabel?`<button class="back-btn2" onclick="goBack()">${backLabel}</button>`:''}
    <button class="next-btn" onclick="goNext()" ${disabled?'disabled':''}>${label}</button>
  `;
}

// ═══════════════════════════════════════════
// TOGGLE / NAV
// ═══════════════════════════════════════════
function toggleCat(id){
  selCatIds.has(id)?selCatIds.delete(id):selCatIds.add(id);
  // 選択解除されたカテゴリーの問題も解除
  CATS.find(c=>c.id===id)?.pids.forEach(pid=>{
    if(!CATS.filter(c=>selCatIds.has(c.id)).flatMap(c=>c.pids).includes(pid)){
      selProbIds.delete(pid);
      delete selHypMap[pid];
    }
  });
  render();
}
function toggleProb(id){
  selProbIds.has(id)?selProbIds.delete(id):selProbIds.add(id);
  if(!selProbIds.has(id)) delete selHypMap[id];
  render();
}
function toggleHyp(pid,hid){
  if(!selHypMap[pid]) selHypMap[pid]=new Set();
  selHypMap[pid].has(hid)?selHypMap[pid].delete(hid):selHypMap[pid].add(hid);
  render();
}

function goNext(){
  if(step===0 && selCatIds.size===0) return;
  if(step===1 && selProbIds.size===0) return;
  if(step===2){
    if(totalHypSel()===0) return;
    // CSVログに記録
    selProbIds.forEach(pid=>{
      const p=P[pid];
      const cat=pidToCat[pid];
      const hyps=[...(selHypMap[pid]||[])].map(hid=>p.hypotheses.find(h=>h.id===hid)).filter(Boolean);
      const jiritsuStr=p.jiritsu.map(area=>`${jc(area.catId).name}（${area.items.join('・')}）`).join(' | ');
      hyps.forEach(h=>{
        sessionLog.push({
          timestamp: new Date().toLocaleString('ja-JP'),
          category: cat.name,
          problem: p.name,
          problemDesc: p.desc,
          jiritsu: jiritsuStr,
          hypothesis: h.text,
          supports: h.supports.map(s=>s.title).join(' / '),
          supportDetails: h.supports.map(s=>`【${s.title}】${s.detail}`).join(' | '),
        });
      });
    });
  }
  step++; render(); window.scrollTo(0,0);
}

function goBack(){
  step--; render(); window.scrollTo(0,0);
}

function restart(){
  step=0; selCatIds.clear(); selProbIds.clear(); selHypMap={};
  render(); window.scrollTo(0,0);
}

// ═══════════════════════════════════════════
// BREADCRUMB
// ═══════════════════════════════════════════
function renderBreadcrumb(){
  const bc=document.getElementById('bc');
  const inner=document.getElementById('bcInner');
  if(step===0){bc.style.display='none';return;}
  bc.style.display='block';
  const steps=[
    {label:'カテゴリー',s:0},
    {label:'問題行動',s:1},
    {label:'仮説',s:2},
    {label:'支援方法',s:3},
  ];
  inner.innerHTML=steps.map((st,i)=>{
    if(i>step) return '';
    const isLast=i===step;
    return (i>0?'<span class="sep">›</span>':'')+
      (isLast?`<span class="bc-current">${st.label}</span>`
             :`<span class="crumb" onclick="goToStep(${st.s})">${st.label}</span>`);
  }).join('');
}

function goToStep(s){
  if(s>=step) return;
  step=s; render(); window.scrollTo(0,0);
}

// ═══════════════════════════════════════════
// CSV EXPORT
// ═══════════════════════════════════════════
function exportCSV(){
  if(!sessionLog.length){showToast('まだ記録がありません。「結果を見る」まで進むと記録されます。');return;}
  const hdrs=['日時','カテゴリー','問題行動','問題の説明','関連する自立活動区分・項目','選択した仮説（原因）','支援方法（タイトル）','支援方法（詳細）'];
  const rows=sessionLog.map(e=>[e.timestamp,e.category,e.problem,e.problemDesc,e.jiritsu,e.hypothesis,e.supports,e.supportDetails].map(c=>`"${String(c).replace(/"/g,'""')}"`));
  const csv='﻿'+[hdrs.map(h=>`"${h}"`), ...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`特別支援_行動支援記録_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`✅ ${sessionLog.length}件の記録をCSVで保存しました`);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

render();
</script>
